apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api-container
        image: 017333715993.dkr.ecr.us-west-2.amazonaws.com/api-smart-cash
        ports:
        - containerPort: 5050
         